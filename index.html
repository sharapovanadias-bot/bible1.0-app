<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bible Gold Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --gold: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-s: #b38728;
            --bg: #ffffff; --text: #1a1a1a; --card: #f2f2f7; --border: rgba(0,0,0,0.05);
        }
        body.dark { --bg: #000000; --text: #ffffff; --card: #1c1c1e; --border: rgba(255,255,255,0.1); }
        body.sepia { --bg: #f4ecd8; --text: #5b4636; --card: #eaddca; --border: rgba(0,0,0,0.05); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
        
        header { position: sticky; top: 0; background: var(--bg); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 20px; font-weight: 800; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { padding: 15px 20px 140px 20px; min-height: 100vh; }

        /* Banner */
        .premium-banner { background: var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 25px; color: #4a3b00; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(179,135,40,0.2); }
        .premium-banner h3 { margin: 0; font-size: 18px; font-weight: 800; }

        /* Book Card */
        .book-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        .b-icon { width: 45px; height: 45px; background: var(--gold); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; margin-right: 15px; font-size: 20px; }
        .b-title { font-weight: 700; font-size: 17px; }
        .b-sub { font-size: 11px; opacity: 0.5; font-weight: bold; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .ch-btn { aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; font-weight: bold; font-size: 18px; color: var(--text); }

        /* Reader */
        .v-row { margin-bottom: 25px; font-size: 19px; line-height: 1.7; font-family: serif; }
        .v-num { color: var(--gold-s); font-weight: 800; font-size: 11px; display: block; margin-bottom: 4px; font-family: sans-serif; }

        /* Nav */
        nav { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--card); border-radius: 25px; display: flex; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); z-index: 2000; }
        .n-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; border: none; background: none; gap: 4px; }
        .n-link.active { color: var(--gold-s); }
        .n-link i { font-size: 20px; }
        .n-link span { font-size: 9px; font-weight: bold; text-transform: uppercase; }

        .hidden { display: none !important; }
        #premium-page { text-align: center; padding: 20px 0; }
        .buy-btn { background: var(--gold); border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: 800; font-size: 16px; margin-top: 20px; box-shadow: 0 10px 20px rgba(179,135,40,0.3); color: #000; }
        
        .img-item { background: var(--card); border-radius: 15px; overflow: hidden; height: 120px; border: 1px solid var(--border); }
        .img-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center;">
            <button id="back-btn" class="hidden" style="border:none;background:none;font-size:24px;color:var(--text);margin-right:10px;"><i class="bi bi-chevron-left"></i></button>
            <span class="logo">BIBLE GOLD</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <i class="bi bi-palette" onclick="nextTheme()" style="font-size:20px; cursor:pointer;"></i>
            <button onclick="toggleLang()" id="lang-btn" style="border:1px solid var(--gold-s); background:none; color:var(--gold-s); font-weight:800; border-radius:8px; padding:3px 8px; font-size:11px;">RU</button>
        </div>
    </header>

    <main id="app-main">
        <div id="v-bible">
            <div id="pro-banner" class="premium-banner" onclick="switchTab('premium')">
                <div><h3 id="pro-banner-title">PRO Доступ</h3><p id="pro-banner-sub">Откройте все книги</p></div>
                <i class="bi bi-gem"></i>
            </div>
            <h2 id="title-main" style="font-weight:800;margin-bottom:20px;">Библия</h2>
            <div id="books-list"></div>
        </div>

        <div id="v-chapters" class="hidden">
            <h2 id="title-chapters" style="font-weight:800;margin-bottom:20px;">Главы</h2>
            <div class="grid" id="chapters-list"></div>
        </div>

        <div id="v-reader" class="hidden"></div>

        <div id="v-gallery" class="hidden">
            <h2 id="title-gallery" style="font-weight:800;margin-bottom:20px;">Галерея</h2>
            <div class="grid" style="grid-template-columns: 1fr 1fr;" id="gallery-list"></div>
        </div>

        <div id="v-favorites" class="hidden">
            <h2 id="title-favorites" style="font-weight:800;margin-bottom:20px;">Избранное</h2>
            <div id="favs-list"></div>
        </div>

        <div id="v-premium" class="hidden">
            <div id="premium-page">
                <i class="bi bi-gem" style="font-size:60px; color:var(--gold-s);"></i>
                <h1 style="font-weight:900; margin:10px 0;">GOLD PASS</h1>
                <p style="opacity:0.6;">Псалтирь, Откровение и полная аудиоверсия</p>
                <div style="text-align:left; background:var(--card); padding:20px; border-radius:20px; margin:20px 0; border: 1px solid var(--border);">
                    <div style="margin-bottom:12px;"><i class="bi bi-check-circle-fill" style="color:var(--gold-s);"></i> Все 66 книг Библии</div>
                    <div style="margin-bottom:12px;"><i class="bi bi-check-circle-fill" style="color:var(--gold-s);"></i> Аудиобиблия без границ</div>
                    <div style="margin-bottom:12px;"><i class="bi bi-check-circle-fill" style="color:var(--gold-s);"></i> HD Галерея сюжетов</div>
                </div>
                <button class="buy-btn" onclick="activatePro()">АКТИВИРОВАТЬ ЗА 399₽</button>
                <p style="margin-top:15px; font-size:11px; opacity:0.4;">Оплата через сервис Tribute</p>
            </div>
        </div>
    </main>

    <nav>
        <button onclick="switchTab('bible')" id="n-bible" class="n-link active"><i class="bi bi-book"></i><span>Текст</span></button>
        <button onclick="switchTab('gallery')" id="n-gallery" class="n-link"><i class="bi bi-image"></i><span>Галерея</span></button>
        <button onclick="switchTab('favorites')" id="n-favorites" class="n-link"><i class="bi bi-star"></i><span>Избранное</span></button>
        <button onclick="switchTab('premium')" id="n-premium" class="n-link"><i class="bi bi-gem"></i><span>PRO</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const state = {
            lang: localStorage.getItem('lang') || 'ru',
            theme: localStorage.getItem('theme') || 'light',
            isPro: localStorage.getItem('isPro') === 'true',
            view: 'books', book: null, ch: null,
            trans: {
                ru: { bible: 'Библия', gallery: 'Галерея', favorites: 'Избранное', premium: 'PRO', pro_t: 'PRO Доступ', pro_s: 'Откройте все книги' },
                en: { bible: 'Bible', gallery: 'Gallery', favorites: 'Favorites', premium: 'PRO', pro_t: 'PRO Access', pro_s: 'Unlock all books' }
            },
            books: {
                ru: [{id:'gen',name:'Бытие',c:50,pro:false},{id:'mat',name:'От Матфея',c:28,pro:false},{id:'joh',name:'От Иоанна',c:21,pro:false},{id:'psa',name:'Псалтирь',c:150,pro:true},{id:'rev',name:'Откровение',c:22,pro:true}],
                en: [{id:'gen',name:'Genesis',c:50,pro:false},{id:'mat',name:'Matthew',c:28,pro:false},{id:'joh',name:'John',c:21,pro:false},{id:'psa',name:'Psalms',c:150,pro:true},{id:'rev',name:'Revelation',c:22,pro:true}]
            }
        };

        function init() {
            tg.expand();
            applyTheme();
            updateUI();
            document.getElementById('back-btn').onclick = goBack;
        }

        function applyTheme() { document.body.className = state.theme; }
        function nextTheme() {
            const themes = ['light', 'dark', 'sepia'];
            state.theme = themes[(themes.indexOf(state.theme) + 1) % 3];
            localStorage.setItem('theme', state.theme);
            applyTheme();
        }

        function toggleLang() {
            state.lang = state.lang === 'ru' ? 'en' : 'ru';
            localStorage.setItem('lang', state.lang);
            updateUI();
            if(state.view === 'chapters') selectBook(state.book);
            if(state.view === 'reader') selectChapter(state.ch);
        }

        function updateUI() {
            const t = state.trans[state.lang];
            document.getElementById('lang-btn').innerText = state.lang.toUpperCase();
            document.getElementById('n-bible').querySelector('span').innerText = t.bible;
            document.getElementById('n-gallery').querySelector('span').innerText = t.gallery;
            document.getElementById('n-favorites').querySelector('span').innerText = t.favorites;
            document.getElementById('title-main').innerText = t.bible;
            document.getElementById('title-gallery').innerText = t.gallery;
            document.getElementById('title-favorites').innerText = t.favorites;
            document.getElementById('pro-banner-title').innerText = t.pro_t;
            document.getElementById('pro-banner-sub').innerText = t.pro_s;
            if(state.isPro) document.getElementById('pro-banner').classList.add('hidden');
            renderBooks();
        }

        function renderBooks() {
            const list = document.getElementById('books-list');
            list.innerHTML = '';
            state.books[state.lang].forEach(b => {
                const div = document.createElement('div');
                div.className = 'book-card';
                div.innerHTML = `<div class="b-icon"><i class="bi bi-book"></i></div><div style="flex-grow:1;"><div class="b-title">${b.name}</div><div class="b-sub">${b.c} глав</div></div>${b.pro && !state.isPro ? '<i class="bi bi-lock-fill" style="color:var(--gold-s);"></i>' : '<i class="bi bi-chevron-right" style="opacity:0.2;"></i>'}`;
                div.onclick = () => { if(b.pro && !state.isPro) switchTab('premium'); else selectBook(b); };
                list.appendChild(div);
            });
        }

        function selectBook(b) {
            state.book = b; state.view = 'chapters';
            showView('v-chapters');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('title-chapters').innerText = b.name;
            const container = document.getElementById('chapters-list');
            container.innerHTML = '';
            for(let i=1; i<=b.c; i++) {
                const btn = document.createElement('button');
                btn.className = 'ch-btn'; btn.innerText = i;
                btn.onclick = () => selectChapter(i);
                container.appendChild(btn);
            }
        }

        async function selectChapter(chNum) {
            state.ch = chNum; state.view = 'reader';
            showView('v-reader');
            const vr = document.getElementById('v-reader');
            vr.innerHTML = '<p style="text-align:center;padding:50px;">...</p>';
            try {
                const r = await fetch(`data/${state.lang}/${state.book.id}.json`);
                const d = await r.json();
                const chapter = d.chapters.find(c => c.chapter === chNum);
                vr.innerHTML = chapter.verses.map((t, i) => `<div class="v-row"><span class="v-num">${i+1}</span>${t}</div>`).join('');
            } catch(e) { vr.innerHTML = 'Error'; }
        }

        function showView(id) {
            ['v-bible','v-chapters','v-reader','v-gallery','v-favorites','v-premium'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(t) {
            state.tab = t;
            document.querySelectorAll('.n-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`n-${t}`).classList.add('active');
            if(t === 'bible') { showView(`v-${state.view}`); if(state.view === 'books') document.getElementById('back-btn').classList.add('hidden'); }
            else { showView(`v-${t}`); document.getElementById('back-btn').classList.add('hidden'); }
            if(t === 'gallery') renderGallery();
        }

        function goBack() {
            if(state.view === 'reader') selectBook(state.book);
            else { state.view = 'books'; showView('v-bible'); document.getElementById('back-btn').classList.add('hidden'); }
        }

        function renderGallery() {
            const imgs = ['creation','noah_ark','david_harp','sermon_on_the_mount','revelation'];
            document.getElementById('gallery-list').innerHTML = imgs.map(img => `<div class="img-item"><img src="public/assets/${img}.jpg" onerror="this.src='https://via.placeholder.com/150'"></div>`).join('');
        }

        function activatePro() {
            tg.showConfirm("Выполнить оплату 399₽ через Tribute?", (ok) => {
                if(ok) {
                    state.isPro = true; localStorage.setItem('isPro', 'true');
                    tg.showAlert("Оплата принята! Bible Gold активирован.");
                    updateUI(); switchTab('bible');
                }
            });
        }

        init();
    </script>
</body>
</html>
