<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bible Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --gold: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-s: #b38728;
            --bg: #fcfcf9; --text: #1c1c1e; --card: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
        }
        body.dark { 
            --bg: #0a0a0b; --text: #f2f2f7; --card: #1c1c1e;
            --glass: rgba(28, 28, 30, 0.9);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        header { 
            position: sticky; top: 0; background: var(--bg); padding: 20px; 
            display: flex; align-items: center; justify-content: space-between; z-index: 1000;
        }
        .logo { 
            font-size: 22px; font-weight: 800; background: var(--gold); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        main { padding: 0 20px 120px 20px; min-height: 100vh; }
        .section-title { font-size: 28px; font-weight: 800; margin: 10px 0 20px 0; }

        /* Кнопки книг */
        .book-btn {
            background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px;
            display: flex; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02); cursor: pointer;
        }
        .b-icon {
            width: 50px; height: 50px; background: var(--gold); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 24px; margin-right: 15px;
        }
        .b-info h3 { margin: 0; font-size: 18px; font-weight: 700; }
        .b-info p { margin: 0; font-size: 12px; opacity: 0.5; font-weight: bold; }

        /* Сетка глав */
        .ch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .ch-btn { aspect-ratio: 1; background: var(--card); border: 1px solid rgba(0,0,0,0.05); border-radius: 15px; font-weight: bold; font-size: 18px; color: var(--text); }

        /* Текст Библии */
        .v-row { margin-bottom: 25px; font-size: 19px; line-height: 1.7; }
        .v-num { color: var(--gold-s); font-weight: 800; font-size: 12px; display: block; margin-bottom: 5px; }

        /* Навигация */
        nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            height: 70px; border-radius: 22px; display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .n-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; border: none; background: none; gap: 4px; }
        .n-link.active { color: var(--gold-s); }
        .n-link i { font-size: 20px; }
        .n-link span { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .hidden { display: none !important; }
        #pro-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; color: white; padding: 40px; text-align: center; }
        .pro-b { background: var(--gold); color: #000; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center;">
            <button id="back-btn" class="hidden" style="border:none;background:none;font-size:24px;color:var(--text);margin-right:10px;"><i class="bi bi-arrow-left"></i></button>
            <span class="logo">BIBLE PRO</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <i class="bi bi-moon-stars-fill" onclick="toggleTheme()" style="cursor:pointer;"></i>
            <button onclick="toggleLang()" id="l-btn" style="border:1.5px solid var(--gold-s); background:none; color:var(--gold-s); font-weight:800; border-radius:10px; padding:3px 8px; font-size:12px;">RU</button>
        </div>
    </header>

    <main id="main-content">
        <div id="v-books">
            <h1 class="section-title">Священные Книги</h1>
            <div id="books-list"></div>
        </div>
        <div id="v-chapters" class="hidden">
            <h1 class="section-title">Главы</h1>
            <div class="ch-grid" id="chapters-list"></div>
        </div>
        <div id="v-reader" class="hidden"></div>
        <div id="v-gallery" class="hidden"><h1 class="section-title">Галерея</h1><div id="gallery-list" class="ch-grid" style="grid-template-columns:1fr 1fr;"></div></div>
        <div id="v-favorites" class="hidden"><h1 class="section-title">Избранное</h1><div id="favs-list"></div></div>
    </main>

    <nav>
        <button onclick="tab('bible')" id="n-bible" class="n-link active"><i class="bi bi-book-fill"></i><span>Книги</span></button>
        <button onclick="tab('gallery')" id="n-gallery" class="n-link"><i class="bi bi-palette-fill"></i><span>Рисунки</span></button>
        <button onclick="tab('favorites')" id="n-favorites" class="n-link"><i class="bi bi-star-fill"></i><span>Избранное</span></button>
        <button onclick="showPro()" class="n-link" style="color:var(--gold-s); font-weight:bold;"><i class="bi bi-gem"></i><span>PRO</span></button>
    </nav>

    <div id="pro-screen">
        <div>
            <i class="bi bi-gem" style="font-size: 50px; color: var(--gold-s);"></i>
            <h2>Premium Доступ</h2>
            <p>Откройте все книги, аудиоверсии и эксклюзивные иллюстрации.</p>
            <button class="pro-b" onclick="buyPro()">ПОДПИСАТЬСЯ</button>
            <p onclick="closePro()" style="margin-top:20px; opacity:0.5; font-size:12px;">ЗАКРЫТЬ</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const state = {
            lang: localStorage.getItem('lang') || 'ru',
            theme: localStorage.getItem('theme') || 'light',
            isPro: localStorage.getItem('isPro') === 'true',
            view: 'books', book: null, ch: null,
            books: {
                ru: [{id:'gen',name:'Бытие',c:50,pro:false,icon:'bi-journal-text'},{id:'mat',name:'От Матфея',c:28,pro:false,icon:'bi-sun-fill'},{id:'joh',name:'От Иоанна',c:21,pro:false,icon:'bi-stars'},{id:'psa',name:'Псалтирь',c:150,pro:true,icon:'bi-music-note-list'},{id:'rev',name:'Откровение',c:22,pro:true,icon:'bi-lightning-fill'}],
                en: [{id:'gen',name:'Genesis',c:50,pro:false,icon:'bi-journal-text'},{id:'mat',name:'Matthew',c:28,pro:false,icon:'bi-sun-fill'},{id:'joh',name:'John',c:21,pro:false,icon:'bi-stars'},{id:'psa',name:'Psalms',c:150,pro:true,icon:'bi-music-note-list'},{id:'rev',name:'Revelation',c:22,pro:true,icon:'bi-lightning-fill'}]
            }
        };

        function init() {
            tg.expand();
            document.body.className = state.theme;
            renderBooks();
            document.getElementById('back-btn').onclick = goBack;
        }

        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.body.className = state.theme;
            localStorage.setItem('theme', state.theme);
        }

        function renderBooks() {
            const list = document.getElementById('books-list');
            if(!list) return;
            list.innerHTML = '';
            state.books[state.lang].forEach(b => {
                const div = document.createElement('div');
                div.className = 'book-btn';
                div.innerHTML = `
                    <div class="b-icon"><i class="bi ${b.icon}"></i></div>
                    <div class="b-info"><h3>${b.name}</h3><p>${b.c} ГЛАВ</p></div>
                    ${b.pro && !state.isPro ? '<i class="bi bi-lock-fill" style="margin-left:auto;color:var(--gold-s);"></i>' : '<i class="bi bi-chevron-right" style="margin-left:auto;opacity:0.2;"></i>'}
                `;
                div.onclick = () => { if(b.pro && !state.isPro) showPro(); else selectBook(b); };
                list.appendChild(div);
            });
        }

        function selectBook(b) {
            state.book = b; state.view = 'chapters';
            document.getElementById('back-btn').classList.remove('hidden');
            showView('v-chapters');
            const vc = document.getElementById('chapters-list');
            vc.innerHTML = '';
            for(let i=1; i<=b.c; i++) {
                const btn = document.createElement('button');
                btn.className = 'ch-btn'; btn.innerText = i;
                btn.onclick = () => selectChapter(i);
                vc.appendChild(btn);
            }
        }

        async function selectChapter(ch) {
            state.ch = ch; state.view = 'reader';
            showView('v-reader');
            const vr = document.getElementById('v-reader');
            vr.innerHTML = '<p style="text-align:center;padding:50px;">Загрузка...</p>';
            try {
                const r = await fetch(`data/${state.lang}/${state.book.id}.json`);
                const d = await r.json();
                const chapter = d.chapters.find(c => c.chapter === ch);
                vr.innerHTML = `<h2 style="font-size:14px;opacity:0.4;margin-bottom:30px;">ГЛАВА ${ch}</h2>` + 
                               chapter.verses.map((t, i) => `<div class="v-row"><span class="v-num">${i+1}</span>${t}</div>`).join('');
            } catch(e) { vr.innerHTML = 'Error'; }
        }

        function showView(id) {
            ['v-books','v-chapters','v-reader','v-gallery','v-favorites'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function goBack() {
            if(state.view === 'reader') selectBook(state.book);
            else { state.view = 'books'; showView('v-books'); document.getElementById('back-btn').classList.add('hidden'); }
        }

        function toggleLang() {
            state.lang = state.lang === 'ru' ? 'en' : 'ru';
            localStorage.setItem('lang', state.lang);
            document.getElementById('l-btn').innerText = state.lang.toUpperCase();
            if(state.book) state.book = state.books[state.lang].find(b => b.id === state.book.id);
            renderBooks();
            if(state.view === 'chapters') selectBook(state.book);
            if(state.view === 'reader') selectChapter(state.ch);
        }

        function tab(name) {
            document.querySelectorAll('.n-link').forEach(el => el.classList.remove('active'));
            document.getElementById(`n-${name}`).classList.add('active');
            if(name === 'bible') showView(`v-${state.view}`);
            else { showView(`v-${name}`); document.getElementById('back-btn').classList.add('hidden'); }
        }

        function showPro() { document.getElementById('pro-screen').style.display = 'flex'; }
        function closePro() { document.getElementById('pro-screen').style.display = 'none'; }
        function buyPro() { state.isPro = true; localStorage.setItem('isPro', 'true'); closePro(); renderBooks(); }

        // Запуск
        document.addEventListener('DOMContentLoaded', init);
        // Запасной запуск, если DOMContentLoaded уже прошел
        if (document.readyState === "complete" || document.readyState === "interactive") { init(); }
    </script>
</body>
</html>
