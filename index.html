<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Библия Pro: Полное издание</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --gold: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-s: #b38728;
            --bg: #ffffff; --text: #1a1a1c; --card: #f2f2f7; --border: rgba(0,0,0,0.05);
        }
        body.dark { --bg: #0d0d0e; --text: #f0f0f5; --card: #1c1c1e; --border: rgba(255,255,255,0.1); }
        body.sepia { --bg: #f4ecd8; --text: #5b4636; --card: #eaddca; --border: rgba(0,0,0,0.05); }

        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        header { position: sticky; top: 0; background: var(--bg); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 18px; font-weight: 800; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { padding: 10px 20px 140px 20px; min-height: 100vh; }
        .book-item { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; cursor: pointer; border: 1px solid var(--border); }
        .b-icon { width: 40px; height: 40px; background: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; margin-right: 12px; font-size: 18px; }
        
        .v-row { margin-bottom: 25px; font-size: 19px; line-height: 1.7; font-family: 'Georgia', serif; position: relative; }
        .v-num { color: var(--gold-s); font-weight: 800; font-size: 11px; display: block; margin-bottom: 4px; font-family: sans-serif; }
        .v-actions { position: absolute; right: 0; top: 0; display: flex; gap: 15px; }
        .v-actions i { color: var(--gold-s); font-size: 18px; cursor: pointer; opacity: 0.6; }

        nav { position: fixed; bottom: 20px; left: 10px; right: 10px; background: var(--card); border-radius: 25px; display: flex; padding: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); z-index: 2000; }
        .n-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; border: none; background: none; gap: 4px; }
        .n-link.active { color: var(--gold-s); }
        .n-link i { font-size: 18px; }
        .n-link span { font-size: 8px; font-weight: bold; text-transform: uppercase; }

        .hidden { display: none !important; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; align-items: flex-end; }
        #modal-content { background: var(--bg); width: 100%; border-radius: 25px 25px 0 0; padding: 30px; transform: translateY(100%); transition: 0.3s; color: var(--text); max-height: 85vh; overflow-y: auto; }
        
        .ch-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .ch-btn { aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; font-weight: bold; color: var(--text); }
        
        .search-box { background: var(--card); border-radius: 15px; padding: 12px; width: 100%; border: none; color: var(--text); margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center;">
            <button id="back-btn" class="hidden" style="border:none;background:none;font-size:24px;color:var(--text);margin-right:10px;"><i class="bi bi-chevron-left"></i></button>
            <span class="logo">BIBLE GOLD PRO</span>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <i class="bi bi-palette" onclick="nextTheme()" style="cursor:pointer;"></i>
            <button onclick="toggleLang()" id="lang-btn" style="border:1px solid var(--gold-s); background:none; color:var(--gold-s); font-weight:bold; border-radius:8px; padding:2px 6px; font-size:10px;">RU</button>
        </div>
    </header>

    <main id="app-main">
        <div id="v-bible">
            <input type="text" class="search-box" id="search-input" placeholder="Поиск по книгам...">
            <div id="books-list"></div>
        </div>
        <div id="v-chapters" class="hidden"><div class="ch-grid" id="chapters-list"></div></div>
        <div id="v-reader" class="hidden"></div>
        <div id="v-gallery" class="hidden"><div class="ch-grid" style="grid-template-columns:1fr 1fr;" id="gallery-list"></div></div>
        <div id="v-notes" class="hidden">
            <h2 style="font-weight:800;">Заметки</h2>
            <textarea id="note-text" style="width:100%; height:100px; border-radius:15px; padding:15px; background:var(--card); border:none; color:var(--text);"></textarea>
            <button onclick="saveNote()" style="width:100%; background:var(--gold); border:none; padding:15px; border-radius:15px; font-weight:bold; margin-top:10px;">Сохранить</button>
            <div id="notes-list" style="margin-top:20px;"></div>
        </div>
    </main>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <nav>
        <button onclick="switchTab('bible')" id="n-bible" class="n-link active"><i class="bi bi-book"></i><span>Текст</span></button>
        <button onclick="switchTab('gallery')" id="n-gallery" class="n-link"><i class="bi bi-image"></i><span>Галерея</span></button>
        <button onclick="switchTab('notes')" id="n-notes" class="n-link"><i class="bi bi-pencil-square"></i><span>Заметки</span></button>
        <button onclick="switchTab('premium')" id="n-premium" class="n-link"><i class="bi bi-gem"></i><span>PRO</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const state = {
            lang: localStorage.getItem('lang') || 'ru',
            theme: localStorage.getItem('theme') || 'light',
            view: 'books', book: null, ch: null,
            books: [
                {id:'gen', n_ru:'Бытие', n_en:'Genesis', c:50},
                {id:'exo', n_ru:'Исход', n_en:'Exodus', c:40},
                {id:'lev', n_ru:'Левит', n_en:'Leviticus', c:27},
                {id:'num', n_ru:'Числа', n_en:'Numbers', c:36},
                {id:'deu', n_ru:'Второзаконие', n_en:'Deuteronomy', c:34},
                {id:'jos', n_ru:'Иисус Навин', n_en:'Joshua', c:24},
                {id:'psa', n_ru:'Псалтирь', n_en:'Psalms', c:150},
                {id:'mat', n_ru:'От Матфея', n_en:'Matthew', c:28},
                {id:'mar', n_ru:'От Марка', n_en:'Mark', c:16},
                {id:'luk', n_ru:'От Луки', n_en:'Luke', c:24},
                {id:'joh', n_ru:'От Иоанна', n_en:'John', c:21},
                {id:'act', n_ru:'Деяния', n_en:'Acts', c:28},
                {id:'rev', n_ru:'Откровение', n_en:'Revelation', c:22}
                // Остальные 53 книги добавляются аналогично...
            ]
        };

        function init() {
            tg.expand();
            document.body.className = state.theme;
            renderBooks();
            document.getElementById('back-btn').onclick = goBack;
            document.getElementById('search-input').oninput = (e) => renderBooks(e.target.value);
        }

        function renderBooks(filter = "") {
            const list = document.getElementById('books-list');
            list.innerHTML = '';
            state.books.filter(b => b[`n_${state.lang}`].toLowerCase().includes(filter.toLowerCase())).forEach(b => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `<div class="b-icon"><i class="bi bi-journal-text"></i></div><div><div style="font-weight:700;">${b[`n_${state.lang}`]}</div><div style="font-size:10px; opacity:0.5;">${b.c} глав</div></div>`;
                div.onclick = () => selectBook(b);
                list.appendChild(div);
            });
        }

        function selectBook(b) {
            state.book = b; state.view = 'chapters';
            showView('v-chapters');
            document.getElementById('back-btn').classList.remove('hidden');
            const vc = document.getElementById('chapters-list');
            vc.innerHTML = '';
            for(let i=1; i<=b.c; i++) {
                const btn = document.createElement('button');
                btn.className = 'ch-btn'; btn.innerText = i;
                btn.onclick = () => selectChapter(i);
                vc.appendChild(btn);
            }
        }

        async function selectChapter(chNum) {
            state.ch = chNum; state.view = 'reader';
            showView('v-reader');
            const vr = document.getElementById('v-reader');
            vr.innerHTML = '<p style="text-align:center;padding:50px;">Загрузка текста...</p>';
            try {
                const r = await fetch(`data/${state.lang}/${state.book.id}.json`);
                const d = await r.json();
                const chapter = d.chapters.find(c => c.chapter === chNum);
                vr.innerHTML = chapter.verses.map((t, i) => `<div class="v-row"><div class="v-actions"><i class="bi bi-chat-text" onclick="showComm(${i+1})"></i></div><span class="v-num">${i+1}</span>${t}</div>`).join('');
            } catch(e) { vr.innerHTML = '<p style="text-align:center;padding:50px;opacity:0.5;">Текст этой главы скоро будет добавлен в базу.</p>'; }
        }

        async function showComm(vNum) {
            const content = document.getElementById('modal-content');
            document.getElementById('modal-overlay').style.display = 'flex';
            content.innerHTML = '<p>Загрузка толкования...</p>';
            setTimeout(() => content.style.transform = 'translateY(0)', 10);
            try {
                const r = await fetch(`data/${state.lang}/comm/${state.book.id}_${state.ch}.json`);
                const d = await r.json();
                content.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>Толкование ${vNum}</h3><i class="bi bi-x-lg" onclick="closeModal()"></i></div><p>${d[vNum] || 'Толкование для этого стиха еще не добавлено.'}</p>`;
            } catch(e) { content.innerHTML = '<p>Толкование для этой главы скоро появится в системе.</p>'; }
        }

        function closeModal() {
            document.getElementById('modal-content').style.transform = 'translateY(100%)';
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300);
        }

        function showView(id) {
            ['v-bible','v-chapters','v-reader','v-gallery','v-notes'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(t) {
            document.querySelectorAll('.n-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`n-${t}`).classList.add('active');
            if(t === 'bible') showView(`v-${state.view}`);
            else showView(`v-${t}`);
            if(t === 'notes') renderNotes();
        }

        function goBack() {
            if(state.view === 'reader') selectBook(state.book);
            else { state.view = 'books'; showView('v-bible'); document.getElementById('back-btn').classList.add('hidden'); }
        }

        function nextTheme() {
            const themes = ['light', 'dark', 'sepia'];
            state.theme = themes[(themes.indexOf(state.theme) + 1) % 3];
            document.body.className = state.theme;
            localStorage.setItem('theme', state.theme);
        }

        function toggleLang() {
            state.lang = state.lang === 'ru' ? 'en' : 'ru';
            localStorage.setItem('lang', state.lang);
            document.getElementById('lang-btn').innerText = state.lang.toUpperCase();
            renderBooks();
        }

        init();
    </script>
</body>
</html>
