<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библия для всех</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #222); font-family: sans-serif; }
        .bg-secondary { background-color: var(--tg-theme-secondary-bg-color, #f4f4f5); }
        .text-hint { color: var(--tg-theme-hint-color, #999); }
        .nav-tab.active { color: var(--tg-theme-button-color, #3390ec); border-bottom: 2px solid var(--tg-theme-button-color, #3390ec); }
        .verse-number { font-size: 0.8rem; color: #3390ec; margin-right: 8px; font-weight: bold; }
    </style>
</head>
<body class="antialiased">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="sticky top-0 z-10 bg-secondary p-4 shadow-sm flex items-center justify-between">
            <div class="flex items-center">
                <button id="back-button" class="hidden text-xl mr-3"><i class="bi bi-chevron-left"></i></button>
                <h1 id="header-title" class="text-xl font-bold">Библия</h1>
            </div>
            <button onclick="toggleLanguage()" class="px-3 py-1 rounded-full bg-blue-500 text-white text-xs font-bold uppercase">
                <span id="lang-label">RU</span>
            </button>
        </header>

        <main id="app-content" class="flex-grow p-4 overflow-y-auto pb-20">
            <div id="view-books" class="space-y-2"></div>
            <div id="view-chapters" class="hidden grid grid-cols-5 gap-2"></div>
            <div id="view-reader" class="hidden"></div>
            <div id="view-search" class="hidden">
                <input type="text" id="search-input" placeholder="Поиск..." class="w-full p-3 rounded-lg bg-secondary mb-4">
                <div id="search-results" class="space-y-4"></div>
            </div>
            <div id="view-gallery" class="hidden grid grid-cols-2 gap-3"></div>
            <div id="view-favorites" class="hidden space-y-4"></div>
            <div id="view-info" class="hidden space-y-6 text-center">
                <img src="public/assets/logo.png" class="w-24 h-24 mx-auto rounded-2xl mb-4" onerror="this.src='https://via.placeholder.com/100'">
                <h2 class="text-2xl font-bold" id="info-title">Библия для всех</h2>
                <p class="text-hint">Version 1.1.0</p>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-secondary border-t flex justify-around p-2 z-20">
            <button onclick="switchTab('bible')" id="nav-bible" class="nav-tab active flex flex-col items-center p-2">
                <i class="bi bi-book text-xl"></i><span class="text-[10px] mt-1">Текст</span>
            </button>
            <button onclick="switchTab('favorites')" id="nav-favorites" class="nav-tab flex flex-col items-center p-2">
                <i class="bi bi-bookmark-heart text-xl"></i><span class="text-[10px] mt-1">Избранное</span>
            </button>
            <button onclick="switchTab('gallery')" id="nav-gallery" class="nav-tab flex flex-col items-center p-2">
                <i class="bi bi-image text-xl"></i><span class="text-[10px] mt-1">Рисунки</span>
            </button>
            <button onclick="switchTab('search')" id="nav-search" class="nav-tab flex flex-col items-center p-2">
                <i class="bi bi-search text-xl"></i><span class="text-[10px] mt-1">Поиск</span>
            </button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-tab flex flex-col items-center p-2">
                <i class="bi bi-info-circle text-xl"></i><span class="text-[10px] mt-1">Инфо</span>
            </button>
        </nav>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/50 hidden z-30 flex items-end">
        <div id="modal-content" class="bg-white w-full rounded-t-2xl p-6 transition-transform translate-y-full max-h-[80vh] overflow-y-auto" style="background-color: var(--tg-theme-bg-color, #fff);"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const state = {
            language: localStorage.getItem('lang') || 'ru',
            currentTab: 'bible', view: 'books', currentBook: null, currentChapter: null,
            translations: {
                ru: { bible: 'Библия', search: 'Поиск', gallery: 'Рисунки', info: 'Инфо', favorites: 'Избранное', loading: 'Загрузка...', noResults: 'Ничего не найдено', commentary: 'Толкование' },
                en: { bible: 'Bible', search: 'Search', gallery: 'Gallery', info: 'Info', favorites: 'Favorites', loading: 'Loading...', noResults: 'No results found', commentary: 'Commentary' }
            },
            books: {
                ru: [{id:'gen',name:'Бытие',chapters:50},{id:'psa',name:'Псалтирь',chapters:150},{id:'mat',name:'От Матфея',chapters:28},{id:'joh',name:'От Иоанна',chapters:21},{id:'rev',name:'Откровение',chapters:22}],
                en: [{id:'gen',name:'Genesis',chapters:50},{id:'psa',name:'Psalms',chapters:150},{id:'mat',name:'Matthew',chapters:28},{id:'joh',name:'John',chapters:21},{id:'rev',name:'Revelation',chapters:22}]
            }
        };

        const views = { books: document.getElementById('view-books'), chapters: document.getElementById('view-chapters'), reader: document.getElementById('view-reader'), search: document.getElementById('view-search'), gallery: document.getElementById('view-gallery'), info: document.getElementById('view-info'), favorites: document.getElementById('view-favorites') };
        const headerTitle = document.getElementById('header-title');
        const backButton = document.getElementById('back-button');
        let favorites = JSON.parse(localStorage.getItem('favs') || '[]');

        function init() {
            updateUILanguage();
            backButton.onclick = goBack;
            document.body.style.backgroundColor = tg.backgroundColor;
            document.body.style.color = tg.textColor;
        }

        function updateUILanguage() {
            const t = state.translations[state.language];
            document.getElementById('lang-label').innerText = state.language.toUpperCase();
            ['bible', 'search', 'gallery', 'info', 'favorites'].forEach(id => {
                document.querySelector(`#nav-${id} span`).innerText = t[id];
            });
            if (state.currentTab === 'bible' && state.view === 'books') headerTitle.innerText = t.bible;
            renderBooks();
        }

        function toggleLanguage() {
            state.language = state.language === 'ru' ? 'en' : 'ru';
            localStorage.setItem('lang', state.language);
            if (state.currentBook) state.currentBook = state.books[state.language].find(b => b.id === state.currentBook.id);
            updateUILanguage();
            if (state.view === 'chapters') selectBook(state.currentBook);
            if (state.view === 'reader') selectChapter(state.currentChapter);
        }

        function renderBooks() {
            views.books.innerHTML = '';
            state.books[state.language].forEach(book => {
                const div = document.createElement('div');
                div.className = 'p-4 bg-secondary rounded-xl mb-2 flex justify-between items-center cursor-pointer';
                div.innerHTML = `<span>${book.name}</span><i class="bi bi-chevron-right text-hint"></i>`;
                div.onclick = () => selectBook(book);
                views.books.appendChild(div);
            });
        }

        function selectBook(book) {
            state.currentBook = book;
            state.view = 'chapters';
            headerTitle.innerText = book.name;
            backButton.classList.remove('hidden');
            views.books.classList.add('hidden');
            views.chapters.classList.remove('hidden');
            views.chapters.innerHTML = '';
            for (let i = 1; i <= book.chapters; i++) {
                const btn = document.createElement('button');
                btn.className = 'aspect-square flex items-center justify-center bg-secondary rounded-lg font-bold';
                btn.innerText = i;
                btn.onclick = () => selectChapter(i);
                views.chapters.appendChild(btn);
            }
        }

        async function selectChapter(ch) {
            state.currentChapter = ch;
            state.view = 'reader';
            headerTitle.innerText = `${state.currentBook.name}, ${ch}`;
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views.reader.classList.remove('hidden');
            views.reader.innerHTML = '<p class="p-10 text-center">Загрузка...</p>';
            try {
                const resp = await fetch(`data/${state.language}/${state.currentBook.id}.json`);
                const data = await resp.json();
                const chapter = data.chapters.find(c => c.chapter === ch);
                let html = '';
                chapter.verses.forEach((text, i) => {
                    const vNum = i + 1;
                    const isFav = favorites.some(f => f.id === state.currentBook.id && f.ch === ch && f.v === vNum && f.l === state.language);
                    html += `<div class="mb-4 p-3 bg-secondary/30 rounded-xl">
                        <div class="flex justify-between mb-1">
                            <span class="verse-number">${vNum}</span>
                            <div class="flex gap-4">
                                <button onclick="toggleFav('${state.currentBook.id}','${state.currentBook.name}',${ch},${vNum},'${text.replace(/'/g,"\\'")}')" class="${isFav?'text-red-500':'text-hint'}"><i class="bi ${isFav?'bi-heart-fill':'bi-heart'}"></i></button>
                                <button onclick="showComm(${vNum})" class="text-blue-500"><i class="bi bi-chat-text"></i></button>
                            </div>
                        </div>
                        <p>${text}</p>
                    </div>`;
                });
                views.reader.innerHTML = html;
            } catch (e) { views.reader.innerHTML = '<p class="p-10 text-center text-red-500">Ошибка загрузки текста</p>'; }
        }

        function goBack() {
            if (state.view === 'reader') { state.view = 'chapters'; views.reader.classList.add('hidden'); views.chapters.classList.remove('hidden'); headerTitle.innerText = state.currentBook.name; }
            else if (state.view === 'chapters') { state.view = 'books'; views.chapters.classList.add('hidden'); views.books.classList.remove('hidden'); backButton.classList.add('hidden'); headerTitle.innerText = state.translations[state.language].bible; }
        }

        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');
            Object.values(views).forEach(v => v.classList.add('hidden'));
            if (tab === 'bible') { 
                if (state.view === 'books') views.books.classList.remove('hidden');
                else if (state.view === 'chapters') views.chapters.classList.remove('hidden');
                else views.reader.classList.remove('hidden');
                headerTitle.innerText = state.view === 'books' ? state.translations[state.language].bible : state.currentBook.name;
            } else {
                views[tab].classList.remove('hidden');
                headerTitle.innerText = state.translations[state.language][tab];
                backButton.classList.add('hidden');
                if (tab === 'gallery') renderGallery();
                if (tab === 'favorites') renderFavs();
            }
        }

        function toggleFav(id, name, ch, v, txt) {
            const idx = favorites.findIndex(f => f.id === id && f.ch === ch && f.v === v && f.l === state.language);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push({id, name, ch, v, text: txt, l: state.language});
            localStorage.setItem('favs', JSON.stringify(favorites));
            if (state.view === 'reader') selectChapter(state.currentChapter);
            if (state.currentTab === 'favorites') renderFavs();
        }

        function renderFavs() {
            const list = favorites.filter(f => f.l === state.language);
            views.favorites.innerHTML = list.length ? list.map(f => `<div class="p-4 bg-secondary rounded-xl mb-2"><p class="text-xs font-bold text-blue-500">${f.name} ${f.ch}:${f.v}</p><p class="text-sm italic">${f.text}</p></div>`).join('') : '<p class="text-center py-10 opacity-50">Пусто</p>';
        }

        function renderGallery() {
            const titles = state.language === 'ru' ? ['Сотворение','Ковчег','Давид','Проповедь','Иерусалим'] : ['Creation','Ark','David','Sermon','Jerusalem'];
            const imgs = ['creation','noah_ark','david_harp','sermon_on_the_mount','revelation'];
            views.gallery.innerHTML = imgs.map((img, i) => `<div class="bg-secondary rounded-lg overflow-hidden"><img src="public/assets/${img}.jpg" class="w-full h-32 object-cover" onerror="this.src='https://via.placeholder.com/150'"><p class="p-2 text-center text-[10px] font-bold">${titles[i]}</p></div>`).join('');
        }

        async function showComm(vNum) {
            const modal = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('translate-y-full'), 10);
            content.innerHTML = '<p>Загрузка...</p>';
            try {
                const resp = await fetch(`data/${state.language}/comm/${state.currentBook.id}_${state.currentChapter}.json`);
                const data = await resp.json();
                content.innerHTML = `<div class="flex justify-between mb-4"><h3 class="font-bold">Толкование ${vNum}</h3><button onclick="closeModal()" class="text-2xl">&times;</button></div><p>${data[vNum] || 'Толкование скоро появится'}</p>`;
            } catch (e) { content.innerHTML = `<div class="flex justify-between mb-4"><h3 class="font-bold">Толкование ${vNum}</h3><button onclick="closeModal()" class="text-2xl">&times;</button></div><p>Толкование для этого стиха еще не добавлено.</p>`; }
        }

        function closeModal() {
            document.getElementById('modal-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal-overlay').classList.add('hidden'), 300);
        }

        init();
    </script>
</body>
</html>
