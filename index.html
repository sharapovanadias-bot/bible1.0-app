<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bible Pro Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --gold: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --gold-s: #b38728;
            --bg: #ffffff; --text: #1a1a1a; --card: #f2f2f7; --border: rgba(0,0,0,0.05);
        }
        body.dark { --bg: #0d0d0e; --text: #f0f0f5; --card: #1c1c1e; --border: rgba(255,255,255,0.1); }
        body.sepia { --bg: #f4ecd8; --text: #5b4636; --card: #eaddca; --border: rgba(0,0,0,0.05); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        
        header { position: sticky; top: 0; background: var(--bg); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 18px; font-weight: 800; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { padding: 15px 20px 140px 20px; min-height: 100vh; }
        .section-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; }

        .book-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        .b-icon { width: 40px; height: 40px; background: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; margin-right: 12px; }
        
        .ch-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .ch-btn { aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; font-weight: bold; color: var(--text); }

        .v-row { margin-bottom: 25px; font-size: 19px; line-height: 1.7; font-family: serif; position: relative; }
        .v-num { color: var(--gold-s); font-weight: 800; font-size: 11px; display: block; margin-bottom: 4px; font-family: sans-serif; }

        nav { position: fixed; bottom: 20px; left: 10px; right: 10px; background: var(--card); border-radius: 25px; display: flex; padding: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); z-index: 2000; }
        .n-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; border: none; background: none; gap: 4px; }
        .n-link.active { color: var(--gold-s); }
        .n-link i { font-size: 18px; }
        .n-link span { font-size: 8px; font-weight: bold; text-transform: uppercase; }

        .hidden { display: none !important; }
        .buy-btn { background: var(--gold); border: none; width: 100%; padding: 18px; border-radius: 18px; font-weight: 800; font-size: 16px; margin-top: 20px; color: #000; box-shadow: 0 10px 20px rgba(179,135,40,0.3); }
        
        .img-item { background: var(--card); border-radius: 15px; overflow: hidden; height: 120px; border: 1px solid var(--border); }
        .img-item img { width: 100%; height: 100%; object-fit: cover; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; align-items: flex-end; }
        #modal-content { background: var(--bg); width: 100%; border-radius: 25px 25px 0 0; padding: 30px; transform: translateY(100%); transition: 0.3s; color: var(--text); max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center;">
            <button id="back-btn" class="hidden" style="border:none;background:none;font-size:24px;color:var(--text);margin-right:10px;"><i class="bi bi-chevron-left"></i></button>
            <span class="logo">BIBLE GOLD PRO</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <i class="bi bi-palette" onclick="nextTheme()" style="cursor:pointer;"></i>
            <button onclick="toggleLang()" id="lang-btn" style="border:1.5px solid var(--gold-s); background:none; color:var(--gold-s); font-weight:800; border-radius:8px; padding:2px 6px; font-size:10px;">RU</button>
        </div>
    </header>

    <main id="app-main">
        <div id="v-bible">
            <h2 class="section-title">Священные Книги</h2>
            <div id="books-list"></div>
        </div>

        <div id="v-chapters" class="hidden">
            <h2 id="title-chapters" class="section-title">Главы</h2>
            <div class="ch-grid" id="chapters-list"></div>
        </div>

        <div id="v-reader" class="hidden"></div>

        <div id="v-gallery" class="hidden">
            <h2 class="section-title">Галерея</h2>
            <div class="ch-grid" style="grid-template-columns: 1fr 1fr;" id="gallery-list"></div>
        </div>

        <div id="v-notes" class="hidden">
            <h2 class="section-title">Заметки</h2>
            <textarea id="note-text" style="width:100%; height:100px; border-radius:15px; padding:15px; background:var(--card); border:none; color:var(--text);" placeholder="Ваши мысли..."></textarea>
            <button onclick="saveNote()" class="buy-btn" style="margin-top:10px;">Сохранить</button>
            <div id="notes-list" style="margin-top:20px;"></div>
        </div>

        <div id="v-premium" class="hidden" style="text-align:center;">
            <i class="bi bi-gem" style="font-size:60px; color:var(--gold-s);"></i>
            <h1 style="font-weight:900; margin:10px 0;">GOLD PASS</h1>
            <p style="opacity:0.6;">Все книги, толкования и аудио</p>
            <div style="text-align:left; background:var(--card); padding:20px; border-radius:20px; margin:20px 0; border: 1px solid var(--border);">
                <div style="margin-bottom:12px;"><i class="bi bi-check-circle-fill" style="color:var(--gold-s);"></i> Псалтирь и Откровение</div>
                <div style="margin-bottom:12px;"><i class="bi bi-check-circle-fill" style="color:var(--gold-s);"></i> Полная аудиобиблия</div>
                <div style="margin-bottom:12px;"><i class="bi bi-check-circle-fill" style="color:var(--gold-s);"></i> HD Галерея сюжетов</div>
            </div>
            <button class="buy-btn" onclick="activatePro()">АКТИВИРОВАТЬ ЗА 399₽</button>
            <p style="margin-top:15px; font-size:11px; opacity:0.4;">Оплата через Tribute</p>
        </div>
    </main>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <nav>
        <button onclick="switchTab('bible')" id="n-bible" class="n-link active"><i class="bi bi-book"></i><span>Текст</span></button>
        <button onclick="switchTab('gallery')" id="n-gallery" class="n-link"><i class="bi bi-image"></i><span>Галерея</span></button>
        <button onclick="switchTab('notes')" id="n-notes" class="n-link"><i class="bi bi-pencil-square"></i><span>Заметки</span></button>
        <button onclick="switchTab('premium')" id="n-premium" class="n-link"><i class="bi bi-gem"></i><span>PRO</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const state = {
            lang: localStorage.getItem('lang') || 'ru',
            theme: localStorage.getItem('theme') || 'light',
            isPro: localStorage.getItem('isPro') === 'true',
            view: 'books', book: null, ch: null,
            books: [
                {id:'gen', n_ru:'Бытие', n_en:'Genesis', c:50, pro:false},
                {id:'mat', n_ru:'От Матфея', n_en:'Matthew', c:28, pro:false},
                {id:'joh', n_ru:'От Иоанна', n_en:'John', c:21, pro:false},
                {id:'act', n_ru:'Деяния', n_en:'Acts', c:28, pro:true},
                {id:'psa', n_ru:'Псалтирь', n_en:'Psalms', c:150, pro:true},
                {id:'rev', n_ru:'Откровение', n_en:'Revelation', c:22, pro:true}
            ]
        };

        function init() {
            tg.expand();
            applyTheme();
            renderBooks();
            document.getElementById('back-btn').onclick = goBack;
            document.getElementById('lang-btn').innerText = state.lang.toUpperCase();
        }

        function applyTheme() { document.body.className = state.theme; }
        
        function nextTheme() {
            const themes = ['light', 'dark', 'sepia'];
            state.theme = themes[(themes.indexOf(state.theme) + 1) % 3];
            localStorage.setItem('theme', state.theme);
            applyTheme();
        }

        function renderBooks() {
            const list = document.getElementById('books-list');
            list.innerHTML = '';
            state.books.forEach(b => {
                const name = state.lang === 'ru' ? b.n_ru : b.n_en;
                const div = document.createElement('div');
                div.className = 'book-card';
                div.innerHTML = `
                    <div class="b-icon"><i class="bi bi-book"></i></div>
                    <div style="flex-grow:1;">
                        <div style="font-weight:700;">${name}</div>
                        <div style="font-size:10px; opacity:0.5;">${b.c} ГЛАВ</div>
                    </div>
                    ${b.pro && !state.isPro ? '<i class="bi bi-lock-fill" style="color:var(--gold-s);"></i>' : '<i class="bi bi-chevron-right" style="opacity:0.2;"></i>'}
                `;
                div.onclick = () => { if(b.pro && !state.isPro) switchTab('premium'); else selectBook(b); };
                list.appendChild(div);
            });
        }

        function selectBook(b) {
            state.book = b; state.view = 'chapters';
            showView('v-chapters');
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('title-chapters').innerText = state.lang === 'ru' ? b.n_ru : b.n_en;
            const container = document.getElementById('chapters-list');
            container.innerHTML = '';
            for(let i=1; i<=b.c; i++) {
                const btn = document.createElement('button');
                btn.className = 'ch-btn'; btn.innerText = i;
                btn.onclick = () => selectChapter(i);
                container.appendChild(btn);
            }
        }

        async function selectChapter(chNum) {
            state.ch = chNum; state.view = 'reader';
            showView('v-reader');
            const vr = document.getElementById('v-reader');
            vr.innerHTML = '<p style="text-align:center;padding:50px;">...</p>';
            try {
                const r = await fetch(`data/${state.lang}/${state.book.id}.json`);
                const d = await r.json();
                const chapter = d.chapters.find(c => c.chapter === chNum);
                vr.innerHTML = chapter.verses.map((t, i) => `
                    <div class="v-row" onclick="showComm(${i+1})">
                        <span class="v-num">${i+1}</span>${t}
                    </div>`).join('');
            } catch(e) { vr.innerHTML = '<p style="text-align:center;padding:50px;opacity:0.5;">Текст скоро будет.</p>'; }
        }

        function showView(id) {
            ['v-bible','v-chapters','v-reader','v-gallery','v-notes','v-premium'].forEach(v => {
                const el = document.getElementById(v);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(t) {
            document.querySelectorAll('.n-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`n-${t}`).classList.add('active');
            if(t === 'bible') {
                showView(`v-${state.view}`);
                if(state.view === 'books') document.getElementById('back-btn').classList.add('hidden');
            } else {
                showView(`v-${t}`);
                document.getElementById('back-btn').classList.add('hidden');
            }
            if(t === 'gallery') renderGallery();
        }

        function renderGallery() {
            const imgs = ['creation','noah_ark','david_harp','sermon_on_the_mount','revelation'];
            document.getElementById('gallery-list').innerHTML = imgs.map(img => `
                <div class="img-item">
                    <img src="public/assets/${img}.jpg" onerror="this.src='https://via.placeholder.com/150'">
                </div>`).join('');
        }

        function goBack() {
            if(state.view === 'reader') selectBook(state.book);
            else { state.view = 'books'; showView('v-bible'); document.getElementById('back-btn').classList.add('hidden'); }
        }

        function toggleLang() {
            state.lang = state.lang === 'ru' ? 'en' : 'ru';
            localStorage.setItem('lang', state.lang);
            document.getElementById('lang-btn').innerText = state.lang.toUpperCase();
            renderBooks();
            if(state.view === 'chapters') selectBook(state.book);
        }

        async function showComm(vNum) {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            overlay.style.display = 'flex';
            content.innerHTML = '<p>...</p>';
            setTimeout(() => content.style.transform = 'translateY(0)', 10);
            try {
                const r = await fetch(`data/${state.lang}/comm/${state.book.id}_${state.ch}.json`);
                const d = await r.json();
                content.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>Толкование ${vNum}</h3><i class="bi bi-x-lg" onclick="closeModal()"></i></div><p style="line-height:1.6;">${d[vNum] || 'Скоро добавим.'}</p>`;
            } catch(e) { content.innerHTML = '<p>Толкование скоро появится.</p>'; }
        }

        function closeModal() {
            document.getElementById('modal-content').style.transform = 'translateY(100%)';
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300);
        }

        function activatePro() {
            tg.showConfirm("Купить PRO доступ за 399₽?", (ok) => {
                if(ok) { state.isPro = true; localStorage.setItem('isPro', 'true'); tg.showAlert("Bible Gold активирован!"); renderBooks(); switchTab('bible'); }
            });
        }

        init();
    </script>
</body>
</html>
