<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Библия Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --gold: #d4af37; --gold-l: #f9e29c;
            --bg: #ffffff; --text: #1a1a1a; 
            --card: #f8f9fa; --border: rgba(0,0,0,0.06);
        }
        body.dark { --bg: #0f0f0f; --text: #e0e0e0; --card: #1a1a1a; --border: rgba(255,255,255,0.08); }
        
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); }
        * { box-sizing: border-box; transition: 0.2s ease; }

        header { position: sticky; top: 0; background: var(--bg); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; background: linear-gradient(to right, #b8860b, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Book Cards */
        .book-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .book-card.locked::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.03); }
        .icon-box { width: 50px; height: 50px; border-radius: 14px; background: var(--gold); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; margin-right: 15px; box-shadow: 0 4px 10px rgba(212,175,55,0.3); }
        .lock-icon { position: absolute; right: 20px; color: var(--gold); font-size: 20px; }

        /* Audio Player Bar */
        #audio-player { position: fixed; bottom: 85px; left: 15px; right: 15px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border-radius: 16px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; color: white; transform: translateY(150%); z-index: 1000; }
        #audio-player.active { transform: translateY(0); }
        .play-btn { font-size: 30px; color: var(--gold); cursor: pointer; }

        /* Text Reader */
        .reader-content { font-family: 'Georgia', serif; font-size: 20px; line-height: 1.8; padding: 20px 0; }
        .verse { margin-bottom: 18px; position: relative; padding-left: 35px; }
        .v-num { position: absolute; left: 0; top: 0; font-size: 12px; color: var(--gold); font-weight: bold; font-family: sans-serif; }

        /* Premium Modal */
        #pro-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 30px; text-align: center; }
        .pro-btn { background: var(--gold); color: black; border: none; padding: 16px 40px; border-radius: 30px; font-weight: 900; font-size: 18px; margin-top: 20px; width: 100%; box-shadow: 0 0 30px rgba(212,175,55,0.5); }

        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg); display: flex; border-top: 1px solid var(--border); z-index: 1000; padding: 0 10px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; border: none; background: none; gap: 4px; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center;">
            <button id="back-btn" class="hidden" style="border:none;background:none;font-size:24px;color:var(--text);margin-right:12px;"><i class="bi bi-chevron-left"></i></button>
            <span class="logo">BIBLE PRO</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <i class="bi bi-moon-stars" onclick="toggleTheme()" style="font-size:20px; cursor:pointer;"></i>
            <button onclick="toggleLang()" style="border:1px solid var(--gold); background:none; color:var(--gold); padding:4px 10px; border-radius:10px; font-weight:bold; font-size:12px;" id="lang-btn">RU</button>
        </div>
    </header>

    <main style="padding: 20px; padding-bottom: 160px;">
        <div id="v-books"></div>
        <div id="v-chapters" class="hidden" style="display:grid; grid-template-columns:repeat(5,1fr); gap:12px;"></div>
        <div id="v-reader" class="hidden reader-content"></div>
        
        <div id="v-gallery" class="hidden" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
        <div id="v-favorites" class="hidden"></div>
    </main>

    <!-- Audio Player UI -->
    <div id="audio-player">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="bi bi-play-circle-fill play-btn" onclick="togglePlay()"></i>
            <div>
                <div style="font-size:12px; font-weight:bold;" id="audio-title">Аудиобиблия</div>
                <div style="font-size:10px; color:#aaa;">Слушать главу</div>
            </div>
        </div>
        <i class="bi bi-x-lg" onclick="closeAudio()" style="cursor:pointer;"></i>
    </div>

    <!-- Premium Buy Modal -->
    <div id="pro-modal">
        <i class="bi bi-gem" style="font-size: 60px; color: var(--gold);"></i>
        <h2 style="font-size: 28px; margin: 20px 0;">Unlock Premium Books</h2>
        <p style="opacity:0.8; line-height:1.6;">Откройте доступ к Псалтири, Откровению, полной аудиобиблии и эксклюзивным толкованиям.</p>
        <button class="pro-btn" onclick="buyPro()">АКТИВИРОВАТЬ ЗА $4.99</button>
        <button onclick="closePro()" style="background:none; border:none; color:white; margin-top:20px; opacity:0.5;">Позже</button>
    </div>

    <nav>
        <button onclick="tab('bible')" id="n-bible" class="nav-item active"><i class="bi bi-book"></i><span>Текст</span></button>
        <button onclick="tab('gallery')" id="n-gallery" class="nav-item"><i class="bi bi-image"></i><span>Галерея</span></button>
        <button onclick="tab('favorites')" id="n-favorites" class="nav-item"><i class="bi bi-bookmark-star"></i><span>Избранное</span></button>
        <button onclick="tab('info')" id="n-info" class="nav-item"><i class="bi bi-person-circle"></i><span>Профиль</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const state = {
            lang: localStorage.getItem('lang') || 'ru',
            theme: localStorage.getItem('theme') || 'light',
            isPro: localStorage.getItem('isPro') === 'true',
            view: 'books', book: null, ch: null,
            books: {
                ru: [
                    {id:'gen', name:'Бытие', c:50, pro:false, icon:'bi-journal-text'},
                    {id:'mat', name:'От Матфея', c:28, pro:false, icon:'bi-brightness-high'},
                    {id:'joh', name:'От Иоанна', c:21, pro:false, icon:'bi-stars'},
                    {id:'psa', name:'Псалтирь', c:150, pro:true, icon:'bi-music-note-beamed'},
                    {id:'rev', name:'Откровение', c:22, pro:true, icon:'bi-lightning-charge'}
                ],
                en: [
                    {id:'gen', name:'Genesis', c:50, pro:false, icon:'bi-journal-text'},
                    {id:'mat', name:'Matthew', c:28, pro:false, icon:'bi-brightness-high'},
                    {id:'joh', name:'John', c:21, pro:false, icon:'bi-stars'},
                    {id:'psa', name:'Psalms', c:150, pro:true, icon:'bi-music-note-beamed'},
                    {id:'rev', name:'Revelation', c:22, pro:true, icon:'bi-lightning-charge'}
                ]
            }
        };

        function init() {
            tg.expand();
            document.body.className = state.theme;
            renderBooks();
            document.getElementById('back-btn').onclick = goBack;
        }

        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.body.className = state.theme;
            localStorage.setItem('theme', state.theme);
        }

        function renderBooks() {
            const container = document.getElementById('v-books');
            container.innerHTML = `<h2 style="margin: 0 0 20px 0; font-size:28px;">Священные книги</h2>`;
            state.books[state.lang].forEach(b => {
                const div = document.createElement('div');
                div.className = `book-card ${b.pro && !state.isPro ? 'locked' : ''}`;
                div.innerHTML = `
                    <div class="icon-box"><i class="bi ${b.icon}"></i></div>
                    <div style="flex-grow:1;">
                        <div style="font-weight:800; font-size:18px;">${b.name}</div>
                        <div style="font-size:12px; opacity:0.6;">${b.c} глав</div>
                    </div>
                    ${b.pro && !state.isPro ? '<i class="bi bi-lock-fill lock-icon"></i>' : '<i class="bi bi-chevron-right" style="opacity:0.3;"></i>'}
                `;
                div.onclick = () => {
                    if(b.pro && !state.isPro) showPro();
                    else selectBook(b);
                };
                container.appendChild(div);
            });
        }

        function selectBook(b) {
            state.book = b; state.view = 'chapters';
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('v-books').classList.add('hidden');
            const vc = document.getElementById('v-chapters');
            vc.classList.remove('hidden');
            vc.innerHTML = '';
            for(let i=1; i<=b.c; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn-ch'; btn.innerText = i;
                btn.style = "aspect-ratio:1; background:var(--card); border:1px solid var(--border); border-radius:12px; font-weight:bold; color:var(--text);";
                btn.onclick = () => selectChapter(i);
                vc.appendChild(btn);
            }
        }

        async function selectChapter(ch) {
            state.ch = ch; state.view = 'reader';
            document.getElementById('v-chapters').classList.add('hidden');
            const vr = document.getElementById('v-reader');
            vr.classList.remove('hidden');
            vr.innerHTML = '<p style="text-align:center;">Загрузка...</p>';
            
            try {
                const r = await fetch(`data/${state.lang}/${state.book.id}.json`);
                const d = await r.json();
                const chapter = d.chapters.find(c => c.chapter === ch);
                vr.innerHTML = chapter.verses.map((t, i) => `<div class="verse"><span class="v-num">${i+1}</span>${t}</div>`).join('');
                
                // Show Audio Player for this chapter
                document.getElementById('audio-title').innerText = `${state.book.name}, Глава ${ch}`;
                document.getElementById('audio-player').classList.add('active');
            } catch(e) { vr.innerHTML = 'Error'; }
        }

        function goBack() {
            if(state.view === 'reader') {
                document.getElementById('v-reader').classList.add('hidden');
                document.getElementById('v-chapters').classList.remove('hidden');
                state.view = 'chapters';
                closeAudio();
            } else {
                document.getElementById('v-chapters').classList.add('hidden');
                document.getElementById('v-books').classList.remove('hidden');
                document.getElementById('back-btn').classList.add('hidden');
                state.view = 'books';
            }
        }

        function tab(name) {
            ['v-books','v-chapters','v-reader','v-gallery','v-favorites','v-info'].forEach(v => {
                const el = document.getElementById(v);
                if(el) el.classList.add('hidden');
            });
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`n-${name}`).classList.add('active');
            
            if(name === 'bible') document.getElementById(`v-${state.view}`).classList.remove('hidden');
            else document.getElementById(`v-${name}`).classList.remove('hidden');
        }

        function showPro() { document.getElementById('pro-modal').style.display = 'flex'; }
        function closePro() { document.getElementById('pro-modal').style.display = 'none'; }
        function buyPro() { 
            state.isPro = true; localStorage.setItem('isPro', 'true');
            tg.showAlert("Premium активирован!");
            closePro(); renderBooks();
        }

        function togglePlay() {
            if(!state.isPro) {
                tg.showAlert("Аудио доступно полностью только в Premium-режиме (демо 30 сек)");
            }
            const btn = document.querySelector('.play-btn');
            btn.classList.toggle('bi-play-circle-fill');
            btn.classList.toggle('bi-pause-circle-fill');
        }
        function closeAudio() { document.getElementById('audio-player').classList.remove('active'); }

        init();
    </script>
</body>
</html>
